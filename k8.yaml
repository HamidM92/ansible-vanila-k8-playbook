---
- name: Prepare RPM-based Linux hosts for vanilla Kubernetes
  hosts: all
  become: true
  gather_facts: true

  vars:
    k8s_version: "{{ k8s_version | default('v1.35') }}"
    kubernetes_repo_baseurl: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/rpm/"
    kubernetes_repo_gpgkey: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/rpm/repodata/repomd.xml.key"

  tasks:
    - name: Set SELinux to permissive immediately
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    - name: Ensure SELinux config is set to permissive persistently
      ansible.builtin.replace:
        path: /etc/selinux/config
        regexp: '^SELINUX=enforcing$'
        replace: 'SELINUX=permissive'

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(.*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Stop and disable firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Configure sysctl for Kubernetes
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Configure kernel modules for Kubernetes
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Load overlay kernel module
      community.builtin.command: modeprobe overlay
        changed_when: false

    - name: Load br_netfilter kernel module
      community.builtin.command: modeprobe br_netfilter 
        changed_when: false

    - name: Install yum-utils
      ansible.builtin.yum:
        name: yum-utils
        state: present

    - name: Add Docker CE repository for containerd
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: '0644'

    - name: Install containerd
      ansible.builtin.yum:
        name: containerd.io
        state: present

    - name: Ensure /etc/containerd directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Generate default containerd config
      ansible.builtin.command: containerd config default
      register: containerd_config
      changed_when: false

    - name: Write containerd config.toml
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_config.stdout }}"
        owner: root
        group: root
        mode: '0644'

    - name: Set SystemdCgroup to true in containerd config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started
        daemon_reload: true

    - name: Restart containerd after config change
      ansible.builtin.systemd:
        name: containerd
        state: restarted

    - name: Configure Kubernetes yum repository
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        owner: root
        group: root
        mode: '0644'
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl={{ kubernetes_repo_baseurl }}
          enabled=1
          gpgcheck=1
          gpgkey={{ kubernetes_repo_gpgkey }}
          exclude=kubelet kubeadm kubectl cri-tools kubernetes-cni

    - name: Install kubelet, kubeadm, and kubectl
      ansible.builtin.yum:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        disable_excludes: kubernetes

    - name: Enable and start kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started
